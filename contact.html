<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Get In Touch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Cloud<span>6</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main class="container page-content">
        <div class="form-wrapper">
            <h2>Contact Our Group</h2>
            <p>Have questions about our cloud infrastructure analysis? Send us a message below.</p>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name">
                    <small class="error-msg" id="nameError"></small>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="username@example.com">
                    <small class="error-msg" id="emailError"></small>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Type your message here..."></textarea>
                    <small class="error-msg" id="messageError"></small>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
            <div id="formSuccess" class="success-box"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Cloud6 Project Group. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
